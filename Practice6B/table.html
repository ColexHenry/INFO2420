<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HTML Practice 6B - Tables</title>
<style>
.tablecenter {
   text-align: center;
}

.tableoptions {
   margin: auto;
   width: 550px;
   border: 1px solid black;
   padding: 3px 6px;
   border-spacing: 4px 3px;
}

tr, th, td {
   color: black;
   border: 1px solid black;
   padding: 3px 6px;
}

.coursecolor {
  background-color: #CCCCCC; 
  width: 25%;
}

.weekdayscolor {
   background-color: #99FF66;
}

.captionstyle {
   color: #003300; 
   text-align: center; 
   margin: auto;
}

</style>
</head>

<body>
<div class="tablecenter" >
   <table class="tableoptions">
      <caption class="captionstyle"><b>My Class Schedule</b></caption>
      
      <colgroup>
         <col class="coursecolor">
         <col span="5">
      </colgroup>
   
      <thead>
         <tr>
            <th>Courses</th>
            <th class="weekdayscolor">Monday</th>
            <th class="weekdayscolor">Tuesday</th>
            <th class="weekdayscolor">Wednesday</th>
            <th class="weekdayscolor">Thursday</th>
            <th class="weekdayscolor">Friday</th>
         </tr>
      </thead>

<tr>
    <th>INFO 1120</th>
    <td></td>
    <td>9-11</td>
    <td></td>
    <td>9-11</td>
    <td rowspan="2"></td>
</tr>


<tr>
    <th>MATH 1010</th>
    <td colspan="4">12-1</td>
</tr>


<tr>
    <th>INFO 2420</th>
    <td colspan="5">Online Available 24/7</td>
</tr>

	
   </table>
</div>



</body>
</html>
